name: Training Pipeline

on:
  workflow_dispatch:  # triggered externally by cron-job.org daily at 1:20 AM PKT

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    env:
      MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
      MONGODB_CLUSTER:  ${{ secrets.MONGODB_CLUSTER }}
      AUTOMATED_RUN:    "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train models
        run: python src/train.py

      - name: Generate 4-day forecast
        run: python src/predict.py

      - name: Generate LIME explanation
        run: python src/create_lime.py

      - name: Generate SHAP explanation
        run: python src/create_shap.py
