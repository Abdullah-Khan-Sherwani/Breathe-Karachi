name: Training Pipeline

on:
  schedule:
    - cron: "0 3 * * *"   # 3 AM UTC = 8 AM PKT
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    env:
      MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
      MONGODB_CLUSTER:  ${{ secrets.MONGODB_CLUSTER }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train models
        run: python src/train.py

      - name: Generate 3-day forecast
        run: python src/predict.py

      - name: Generate LIME explanation
        run: python src/create_lime.py

      - name: Commit LIME artefacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lime_explanations/
          git diff --cached --quiet || git commit -m "chore: update LIME artefacts [skip ci]"
          git push

      - name: Trigger Render deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
